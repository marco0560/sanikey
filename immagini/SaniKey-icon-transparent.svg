<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="1200"
   height="1200"
   viewBox="180 75 840 840"
   role="img"
   aria-labelledby="title desc"
   version="1.1"
   id="svg38"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <defs
     id="defs42" />
  <title
     id="title">SaniKey logo</title>
  <desc
     id="desc">Three ordered blue medical-document dossiers, a coral dual-ended USB drive, index lines, and the SaniKey wordmark.</desc>
  <!-- Exact flat palette: ivory #FFFCF6, royal #2D61BE, intermediate #1D4385,
       midnight #0B1F3A, muted coral #D56F6B. -->
  <!-- Center the complete pictogram over the wordmark. -->
  <g id="pictogram" transform="translate(80,0)">
  <!-- Rear dossier: midnight blue. -->
  <path
     fill="#0B1F3A"
     d="M 282,128 H 598 Q 650,128 650,180 V 670 Q 650,722 598,722 H 282 Q 230,722 230,670 V 180 Q 230,128 282,128 Z"
     id="path6" />
  <!-- Middle dossier: intermediate blue. -->
  <path
     fill="#1D4385"
     d="M 352,198 H 668 Q 720,198 720,250 V 740 Q 720,792 668,792 H 352 Q 300,792 300,740 V 250 Q 300,198 352,198 Z"
     id="path8" />
  <!-- Front dossier: royal blue. -->
  <path
     fill="#2D61BE"
     d="M 422,268 H 738 Q 790,268 790,320 V 810 Q 790,862 738,862 H 422 Q 370,862 370,810 V 320 Q 370,268 422,268 Z"
     id="path10" />
  <!-- Consultation/index tab. -->
  <rect
     x="772"
     y="470"
     width="38"
     height="82"
     rx="15"
     fill="#D56F6B"
     id="rect12" />
  <!-- Dual-ended USB drive: USB-A at upper left, USB-C at lower right. -->
  <g
     transform="translate(485,410) rotate(43) scale(1.25)"
     id="g24">
    <!-- USB-A plug protruding from the compact drive body. -->
    <path
       id="usb-a-head"
       style="fill:#d56f6b"
       d="M 0,16 H 73 V 60 H 0 Z" />
    <!-- Two square holes across the connector face, perpendicular to its axis. -->
    <path
       id="usb-a-hole-1"
       style="fill:#2d61be"
       d="M 15,23 H 27 V 35 H 15 Z" />
    <path
       id="usb-a-hole-2"
       style="fill:#2d61be"
       d="M 15,41 H 27 V 53 H 15 Z" />
    <!-- Short, broad body inspired by a compact swivel dual-ended drive. -->
    <path
       id="usb-body"
       style="fill:#d56f6b"
       d="M 58,0 H 168 Q 184,0 184,16 V 60 Q 184,76 168,76 H 58 Q 46,76 46,64 V 12 Q 46,0 58,0 Z" />
    <!-- USB-C head: straight shoulder at the neck; only the two outer corners are rounded. -->
    <path
       id="usb-c-head"
       style="fill:#d56f6b"
       d="M 174,23 H 201 Q 209,23 209,31 V 45 Q 209,53 201,53 H 174 Z" />
  </g>
  <!-- Ordered index: separate, thin, and subordinate. -->
  <rect
     x="590"
     y="704"
     width="160"
     height="10"
     rx="5"
     fill="#D56F6B"
     id="rect26" />
  <rect
     x="590"
     y="738"
     width="133"
     height="10"
     rx="5"
     fill="#D56F6B"
     id="rect28" />
  <rect
     x="590"
     y="772"
     width="98"
     height="10"
     rx="5"
     fill="#D56F6B"
     id="rect30" />
  </g>
</svg>

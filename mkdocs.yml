site_name: sanikey
site_description: Documenti medici su chiavetta USB
site_author: Marco Coppola

repo_name: sanikey
repo_url: https://github.com/marco0560/sanikey
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code
  - footnotes

plugins:
  - search

nav:
  - Pagina iniziale: index.md
  - Guida Utente: user-guide.md
  - Esempi:
      - Panoramica: examples.md
      - Esempio configurazione: config-example/README.md
      - Esempio pazienti: patients-example/README.md
      - Esempio artefatti generati: generated-example/README.md
      - Esempio paziente generato: generated-example/patient-a/README.md
  - Sviluppo:
      - Avvio sviluppo: getting_started.md
      - Architettura: architecture.md
      - Script: scripts.md
      - Contribuire: CONTRIBUTING.md
      - Implementazione iniziale: process/initial-implementation.md
      - Stato dei test: process/stato-dei-test.md
      - Verifica end-to-end con dati reali: process/end-to-end-real-data-verification.md
      - Riferimento metadati TOML: process/metadata-toml-reference.md
  - Specifiche:
      - Specifica alto livello: sanikey-high-level-spec.md
      - Specifica dettagliata: sanikey-detailed-spec.md
      - Decisioni iniziali: decisions/decisioni-iniziali.md
      - Indice decisioni: decisions/index.md
      - Lingua italiana per errori e interfaccia: decisions/adr-italian-interface-language.md
  - Rilascio:
      - Lista di controllo: release/checklist.md
      - Processo: release/process.md
  - Riferimento:
      - Promemoria: cheatsheet.md

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        exclude: mkdocs.yml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: generate-cheatsheet
        name: Generate cheatsheet.md
        entry: python scripts/generate_cheatsheet.py
        language: system
        pass_filenames: false
        always_run: true
      - id: verify-cheatsheet-clean
        name: Verify cheatsheet.md is up to date
        entry: >
          bash -c 'git diff --exit-code docs/cheatsheet.md ||
          (echo "ERROR: docs/cheatsheet.md is out of date.
          Run scripts/generate_cheatsheet.py and commit the result." && exit 1)'
        language: system
        pass_filenames: false
        always_run: true
      - id: mypy
        name: mypy (package)
        entry: uv run python scripts/run_repo_tool.py mypy src/sanikey
        language: system
        pass_filenames: false
      - id: pyproject-lint
        name: pyproject structural lint
        entry: python scripts/pyproject_lint.py
        language: system
        pass_filenames: false

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install system document converters
        run: |
          sudo apt-get update
          sudo apt-get install --yes pandoc

      - name: Install project dependencies
        run: |
          retry() {
            for attempt in 1 2 3; do
              "$@" && return 0
              if [ "$attempt" = "3" ]; then
                return 1
              fi
              sleep 15
            done
          }

          retry uv sync --frozen --group dev --extra docs


      - name: Install repo-local Git configuration
        run: uv run python scripts/install_repo_git_config.py

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files

      - name: Run standard validation
        run: uv run python scripts/validate_repo.py

      - name: Build distributable package
        run: uv run python -m build

      - name: Check distributable package metadata
        run: uv run twine check --strict dist/*

      - name: Run release audit
        env:
          SKIP_RELEASE_AUDIT: "1"
        run: bash scripts/release_audit.sh
